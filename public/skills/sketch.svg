<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sketchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD93D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F4A261;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#sketchGrad)" opacity="0.1" stroke="url(#sketchGrad)" stroke-width="2"/>
  
  <!-- Sketch diamond/gem shape -->
  <g transform="translate(100, 100)">
    <path d="M 0,-40 L 35,-10 L 0,20 L -35,-10 Z" fill="#F4A261" stroke="#FFD93D" stroke-width="3" stroke-linejoin="round"/>
    <path d="M -35,-10 L 0,-40 L 35,-10 L 0,5 Z" fill="#FFD93D" opacity="0.8"/>
    <path d="M -35,-10 L 0,20 L 35,-10 L 0,5 Z" fill="#F4A261" opacity="0.6"/>
  </g>
</svg>