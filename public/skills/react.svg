<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="reactGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#61DAFB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891B2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#reactGrad)" opacity="0.1" stroke="url(#reactGrad)" stroke-width="2"/>
  
  <!-- React atom -->
  <g transform="translate(100, 100)">
    <!-- Center electron -->
    <circle cx="0" cy="0" r="8" fill="#61DAFB"/>
    
    <!-- Orbits -->
    <ellipse cx="0" cy="0" rx="35" ry="15" fill="none" stroke="#61DAFB" stroke-width="3" transform="rotate(0)"/>
    <ellipse cx="0" cy="0" rx="35" ry="15" fill="none" stroke="#61DAFB" stroke-width="3" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="35" ry="15" fill="none" stroke="#61DAFB" stroke-width="3" transform="rotate(120)"/>
    
    <!-- Electrons on orbits -->
    <circle cx="35" cy="0" r="5" fill="#0891B2"/>
    <circle cx="-17.5" cy="30.3" r="5" fill="#0891B2"/>
    <circle cx="-17.5" cy="-30.3" r="5" fill="#0891B2"/>
  </g>
</svg>