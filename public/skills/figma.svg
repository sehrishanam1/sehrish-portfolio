<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="figmaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F92E8F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D9FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Main circle background -->
  <circle cx="100" cy="100" r="95" fill="url(#figmaGrad)" opacity="0.1" stroke="url(#figmaGrad)" stroke-width="2"/>
  
  <!-- Figma icon -->
  <g transform="translate(100, 100)">
    <!-- Left circle -->
    <circle cx="-25" cy="-20" r="16" fill="#FF6B35"/>
    <!-- Top right circle -->
    <circle cx="15" cy="-20" r="16" fill="#F92E8F"/>
    <!-- Middle right circle -->
    <circle cx="15" cy="15" r="16" fill="#00D9FF"/>
    <!-- Bottom left circle -->
    <circle cx="-25" cy="15" r="16" fill="#A6E3A1"/>
    <!-- Center piece -->
    <circle cx="-5" cy="-2" r="12" fill="#FFFFFF" opacity="0.9"/>
  </g>
</svg>